<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex,nofollow">
<title>התפריט · אדמין · סיימת להיום</title>
<link rel="icon" type="image/png" href="/brand_assets/Logo.png"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        "outline": "#817563", "secondary": "#9e3e4c",
        "surface-bright": "#fff8f3", "surface-container-highest": "#ece1d4",
        "on-surface-variant": "#4f4535", "background": "#fff8f3",
        "primary-fixed": "#ffdea6", "primary": "#785600", "on-primary": "#ffffff",
        "on-surface": "#201b13", "surface-container-high": "#f1e7d9",
        "surface-container-low": "#fdf2e5", "surface": "#fff8f3",
        "primary-container": "#986d00", "surface-container-lowest": "#ffffff",
        "outline-variant": "#d3c4af", "surface-container": "#f7ecdf",
        "review-pending": "#B8860B",
        "review-done": "#5a7a3a",
        "review-done-bg": "#eef0e3"
      },
      borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
      spacing: { lg: "48px", "container-max": "1200px", md: "24px", sm: "12px",
        gutter: "24px", xs: "4px", xl: "80px", base: "8px" },
      fontFamily: { display: ["Heebo"], body: ["Assistant"] },
      boxShadow: {
        "warm-sm": "0 1px 2px rgba(120,86,0,0.06), 0 1px 1px rgba(120,86,0,0.04)",
        "warm-md": "0 4px 12px rgba(120,86,0,0.06), 0 2px 4px rgba(120,86,0,0.04)",
        "warm-lg": "0 12px 32px rgba(120,86,0,0.08), 0 4px 12px rgba(120,86,0,0.05)",
        "warm-xl": "0 24px 56px rgba(120,86,0,0.10), 0 8px 24px rgba(120,86,0,0.06)"
      }
    }}
  };
</script>
<style>
  /* ===== Source: done.html mockup (website/_dev-mockups/admin/done.html lines 17-79) ===== */
  body { background: #fff8f3; font-family: 'Assistant', sans-serif; color: #201b13;
    min-height: 100vh; overflow-x: hidden; }
  .font-display { font-family: 'Heebo', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* Paper grain — subtle SVG noise, identical to chrome canon */
  .grain::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.04; mix-blend-mode: multiply;
  }

  /* Source: done.html mockup — overrides chrome canon for celebration buttons */
  .btn-primary { display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, #8a6300 0%, #6d4c00 100%); color: #ffffff;
    font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 16px;
    padding: 14px 28px; border-radius: 12px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 16px rgba(120,86,0,0.25);
    transition: transform 120ms ease, filter 150ms ease;
    cursor: pointer; border: none; }
  .btn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); filter: brightness(0.98); }
  .btn-primary:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(120,86,0,0.20), 0 6px 16px rgba(120,86,0,0.25); }

  /* Source: done.html mockup — overrides chrome canon for celebration buttons */
  .btn-secondary { display: inline-flex; align-items: center; gap: 8px;
    background: #ffffff; color: #4f4535; font-family: 'Heebo', sans-serif;
    font-weight: 600; font-size: 15px; padding: 13px 22px; border-radius: 12px;
    border: 1px solid #d3c4af;
    transition: background-color 150ms ease, border-color 150ms ease;
    cursor: pointer; }
  .btn-secondary:hover { background: #fdf2e5; border-color: #B8860B; }
  .btn-secondary:active { transform: translateY(1px); }
  .btn-secondary:focus-visible { outline: none; box-shadow: 0 0 0 4px rgba(120,86,0,0.10); }

  /* Ornament line — uppercase letterspaced label flanked by gradient hairlines */
  .ornament-line { display: flex; align-items: center; gap: 16px; color: #817563;
    font-size: 11px; font-family: 'Heebo', sans-serif; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; }
  .ornament-line::before, .ornament-line::after { content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #d3c4af 40%, #d3c4af 60%, transparent); }

  /* Decorative blooms — radial gradients blurred behind the card for layered depth */
  .bloom-a, .bloom-b, .bloom-c { position: fixed; border-radius: 50%; filter: blur(100px);
    pointer-events: none; opacity: 0.5; z-index: 0; }
  .bloom-a { top: -180px; right: -180px; width: 560px; height: 560px;
    background: radial-gradient(circle, #ffdea6 0%, transparent 70%); }
  .bloom-b { bottom: -200px; left: -160px; width: 520px; height: 520px;
    background: radial-gradient(circle, #fd8896 0%, transparent 70%); opacity: 0.25; }
  .bloom-c { top: 30%; left: 8%; width: 340px; height: 340px;
    background: radial-gradient(circle, #c9d8a4 0%, transparent 70%); opacity: 0.45; }

  /* Confetti dots — pure CSS positioned squares, no JS lib */
  .confetti { position: absolute; width: 8px; height: 8px; border-radius: 2px;
    transform: rotate(15deg); z-index: 2; }

  /* Hero number — gradient-clipped digit for the day's count */
  .hero-num { font-family: 'Heebo', sans-serif; font-weight: 800;
    letter-spacing: -0.05em; line-height: 0.9;
    font-size: 180px;
    background: linear-gradient(180deg, #785600 0%, #5a4000 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 12px; }

  /* Soft progress dot row — 20 sage dots */
  .dot-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    max-width: 460px; margin: 0 auto; }
  .dot { width: 14px; height: 14px; border-radius: 999px;
    background: linear-gradient(135deg, #88a266, #5a7a3a);
    box-shadow: 0 1px 2px rgba(90,122,58,0.2); }

  /* Card — color-tinted layered shadow per anti-generic guardrails */
  .card { background: #ffffff; border-radius: 24px; border: 1px solid #ece1d4;
    box-shadow: 0 1px 2px rgba(120,86,0,0.04), 0 24px 56px rgba(120,86,0,0.10); }
</style>
</head>
<body class="grain">
  <div class="bloom-a"></div>
  <div class="bloom-b"></div>
  <div class="bloom-c"></div>

  <!-- Confetti — sprinkled around the viewport behind the card -->
  <div class="confetti" style="top: 12%; right: 18%; background: #B8860B;"></div>
  <div class="confetti" style="top: 18%; right: 28%; background: #5a7a3a; transform: rotate(-25deg);"></div>
  <div class="confetti" style="top: 24%; left: 22%; background: #9e3e4c; transform: rotate(40deg);"></div>
  <div class="confetti" style="top: 30%; left: 12%; background: #785600; width: 6px; height: 6px;"></div>
  <div class="confetti" style="bottom: 22%; right: 12%; background: #5a7a3a; transform: rotate(-15deg);"></div>
  <div class="confetti" style="bottom: 18%; left: 20%; background: #B8860B; width: 6px; height: 6px;"></div>
  <div class="confetti" style="bottom: 30%; right: 30%; background: #9e3e4c; width: 6px; height: 6px; transform: rotate(45deg);"></div>
  <div class="confetti" style="top: 38%; left: 30%; background: #785600; transform: rotate(-30deg); width: 6px; height: 6px;"></div>
  <div class="confetti" style="top: 14%; left: 30%; background: #5a7a3a; transform: rotate(15deg); width: 6px; height: 6px;"></div>
  <div class="confetti" style="top: 22%; right: 12%; background: #785600; transform: rotate(-10deg);"></div>

  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 py-14">
    <div class="card max-w-[640px] w-full p-10 text-center relative">
      <div class="ornament-line mx-auto mb-5" style="width: 220px;">היעד היומי הושלם</div>

      <p class="text-[14px] text-on-surface-variant mb-2">סיימת היום</p>
      <div class="hero-num"><span id="today-count">20</span></div>
      <h1 class="font-display text-[28px] md:text-[32px] font-extrabold tracking-tight text-on-surface mb-3">כל הכבוד, אדי!</h1>
      <p class="text-[15px] text-on-surface-variant leading-relaxed mb-2">סיימת לבדוק 20 מתכונים היום.</p>
      <p class="text-[15px] text-on-surface-variant leading-relaxed mb-7">
        נשארו עוד <span id="remaining" class="font-semibold text-on-surface">—</span> מתכונים — בערך
        <span id="days-left" class="font-semibold text-on-surface">—</span> ימי בדיקה.
      </p>

      <!-- Dot row — 20 sage dots filled per mockup style; built via DOM -->
      <div class="dot-row mb-8" id="dot-row"></div>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button id="btn-finish-day" type="button" class="btn-secondary">
          <span class="material-symbols-outlined text-[18px]">logout</span>
          <span>סיימי להיום</span>
        </button>
        <button id="btn-keep-going" type="button" class="btn-primary">
          <span>המשיכי בכל זאת</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
      </div>
    </div>

    <p class="text-[13px] text-on-surface-variant mt-6">נתראה מחר 🌙</p>
  </main>
<script>
(async function init() {
  const statusEl = document.getElementById('remaining');
  const daysEl = document.getElementById('days-left');
  const todayCountEl = document.getElementById('today-count');

  // Auth gate + fetch the data we need: full recipes list (for remaining/days-left math).
  try {
    const r = await fetch('/api/admin/recipes', { credentials: 'same-origin' });
    if (r.status === 401) { window.location.replace('/admin/login'); return; }
    if (!r.ok) {
      // Soft-fail: render the screen with placeholder text. Adi can still log out.
      statusEl.textContent = '—';
      daysEl.textContent = '—';
    } else {
      const { recipes } = await r.json();
      const list = recipes || [];
      const total = list.length;
      const reviewed = list.filter(x => x.reviewedAt).length;
      const remaining = Math.max(0, total - reviewed);
      const days = Math.ceil(remaining / 20);

      // Today count: filter by today's IL date — matches edit.html's todayStartIL() logic
      const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' });
      const todayCount = list.filter(x => {
        if (!x.reviewedAt) return false;
        try { return new Date(x.reviewedAt).toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' }) === today; }
        catch { return false; }
      }).length;

      todayCountEl.textContent = String(todayCount || 20);
      statusEl.textContent = String(remaining);
      daysEl.textContent = String(days);
    }
  } catch {
    statusEl.textContent = '—';
    daysEl.textContent = '—';
  }

  // Build the 20-dot row (pure DOM)
  const dotRow = document.getElementById('dot-row');
  dotRow.replaceChildren();
  for (let i = 0; i < 20; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dotRow.appendChild(dot);
  }
})();

document.getElementById('btn-finish-day').addEventListener('click', async () => {
  try { await fetch('/api/admin/logout', { method: 'POST', credentials: 'same-origin' }); } catch {}
  window.location.href = '/admin/login';
});

document.getElementById('btn-keep-going').addEventListener('click', () => {
  // Lift the cap for the rest of the IL-day session — sessionStorage clears when tab closes.
  sessionStorage.setItem('nudgeBypassed', 'true');
  window.location.href = '/admin/edit';
});
</script>
</body>
</html>
